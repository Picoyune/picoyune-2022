<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MA-1 Monitor Interface | Picoyune</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
    <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0e17;
            --bg-secondary: #111827;
            --bg-tertiary: #1a2235;
            --bg-card: #151d2e;
            --border: #2a3548;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent-gold: #d4a853;
            --accent-gold-dim: #a68632;
            --accent-cyan: #22d3ee;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --accent-orange: #f59e0b;
            --gradient-gold: linear-gradient(135deg, #d4a853 0%, #f0c674 50%, #d4a853 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Subtle grid background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                linear-gradient(rgba(212, 168, 83, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(212, 168, 83, 0.02) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: 0;
        }

        #root {
            position: relative;
            z-index: 1;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        /* Animation keyframes */
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(212, 168, 83, 0.3); }
            50% { box-shadow: 0 0 40px rgba(212, 168, 83, 0.5); }
        }

        @keyframes slide-up {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fade-in {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // ============================================
        // SERIAL PROTOCOL CONSTANTS
        // ============================================
        const TERMINAL_BAUD = 1000000;
        const MINIMUM_VERSION = { major: 1, minor: 0, build: 0 };

        // ============================================
        // UTILITY FUNCTIONS
        // ============================================
        function parseVersion(line) {
            const match = line.match(/^Version: (\d+)\.(\d+)\.(\d+)$/);
            if (match) {
                return {
                    major: parseInt(match[1]),
                    minor: parseInt(match[2]),
                    build: parseInt(match[3])
                };
            }
            return null;
        }

        function versionToString(v) {
            return `${v.major}.${v.minor}.${v.build}`;
        }

        function compareVersions(a, b) {
            if (a.major !== b.major) return a.major - b.major;
            if (a.minor !== b.minor) return a.minor - b.minor;
            return a.build - b.build;
        }

        function formatLocalTime(utcTimestamp) {
            const date = new Date(utcTimestamp * 1000);
            return date.toLocaleString();
        }

        function getCurrentUTCTimestamp() {
            return Math.floor(Date.now() / 1000);
        }

        // ============================================
        // DATA PROCESSING (from data.py)
        // ============================================
        function processFileLines(lines) {
            const hgList = [];
            let fileHeader = "None";
            let calHeader = "None";

            for (const line of lines) {
                if (line.startsWith('Serial')) {
                    fileHeader = line;
                }
                if (line.startsWith('Calibrated')) {
                    calHeader = line;
                }

                const txt = line.trim();
                const parts = txt.split(',').map(s => s.trim()).filter(s => s !== '');

                if (parts.length === 3) {
                    try {
                        const timestamp = parseFloat(parts[0]);
                        const value = parseFloat(parts[1]);
                        const dataType = parseInt(parts[2]);

                        // Valid time range check (946684800 = Jan 1, 2000)
                        if (timestamp > 946684800 && timestamp < 4126976848) {
                            if (dataType === 3) { // Hg data
                                hgList.push({ time: timestamp, value: value });
                            }
                        }
                    } catch (e) {
                        // Skip bad lines
                    }
                } else if (parts.length === 4) {
                    // Alternative format with timezone
                    const timezone = parts[2];
                    const tsString = parts[0] + parts[1] + timezone;
                    try {
                        const date = new Date(tsString);
                        if (!isNaN(date.getTime())) {
                            hgList.push({ time: date.getTime() / 1000, value: parseFloat(parts[3]) });
                        }
                    } catch (e) {
                        // Skip bad lines
                    }
                }
            }

            return { hgData: hgList, fileHeader, calHeader };
        }

        // Session gap threshold in seconds (20 minutes)
        const SESSION_GAP_THRESHOLD = 20 * 60;

        // Generate filename with date, time, and serial number
        function generateFilename(fileHeader, extension = 'csv', prefix = 'Hg') {
            const now = new Date();
            const dateStr = now.toISOString().slice(0, 10); // YYYY-MM-DD
            const timeStr = now.toTimeString().slice(0, 5).replace(':', ''); // HHMM
            
            // Extract last 6 characters of serial number from header
            // Header format example: "SerialNo: 1PICOE462289047391130" -> "391130"
            let serialSuffix = '';
            if (fileHeader && fileHeader !== 'None') {
                // Match "SerialNo:" or "Serial:" followed by the serial string
                const serialMatch = fileHeader.match(/SerialNo[:\s]+(\S+)/i) || 
                                   fileHeader.match(/Serial[:\s]+(\S+)/i);
                if (serialMatch && serialMatch[1]) {
                    // Get last 6 characters of the serial number
                    serialSuffix = serialMatch[1].slice(-6);
                }
            }
            
            if (serialSuffix) {
                return `MA1-${prefix}-${dateStr}-${timeStr}-${serialSuffix}.${extension}`;
            } else {
                return `MA1-${prefix}-${dateStr}-${timeStr}.${extension}`;
            }
        }

        function detectSessions(hgData) {
            if (hgData.length === 0) return [];
            
            const sessions = [];
            let currentSession = [hgData[0]];
            
            for (let i = 1; i < hgData.length; i++) {
                const gap = hgData[i].time - hgData[i - 1].time;
                
                if (gap > SESSION_GAP_THRESHOLD) {
                    // Gap detected, start new session
                    sessions.push(currentSession);
                    currentSession = [hgData[i]];
                } else {
                    currentSession.push(hgData[i]);
                }
            }
            
            // Don't forget the last session
            if (currentSession.length > 0) {
                sessions.push(currentSession);
            }
            
            return sessions;
        }

        function calculateTWAForSession(sessionData) {
            if (sessionData.length === 0) return { twa: [], oshaTwa: [] };

            const startTime = sessionData[0].time;
            let twaAddition = [sessionData[0].value * 60];
            const twa = [{ time: startTime, value: twaAddition[0] / 60 }];
            const oshaTwa = [{ time: startTime, value: twaAddition[0] / (8 * 3600) }];

            for (let i = 1; i < sessionData.length; i++) {
                const tDiff = sessionData[i].time - sessionData[i - 1].time;
                
                if (tDiff < 61) {
                    twaAddition.push(tDiff * sessionData[i].value);
                } else if (tDiff < 301) {
                    twaAddition.push(tDiff * (sessionData[i].value + sessionData[i - 1].value) / 2);
                } else {
                    twaAddition.push(60 * sessionData[i].value);
                }

                const totalTwa = twaAddition.reduce((a, b) => a + b, 0);
                const elapsedTime = sessionData[i].time - startTime + 60;
                
                twa.push({ time: sessionData[i].time, value: totalTwa / elapsedTime });

                if (sessionData[i].time - startTime <= 8 * 3600) {
                    oshaTwa.push({ time: sessionData[i].time, value: totalTwa / (8 * 3600) });
                } else {
                    // Find index for 8-hour window
                    let idx = 0;
                    for (let j = 0; j < sessionData.length; j++) {
                        if (sessionData[j].time - sessionData[i].time > -8 * 3600) {
                            idx = j;
                            break;
                        }
                    }
                    const windowSum = twaAddition.slice(idx).reduce((a, b) => a + b, 0);
                    oshaTwa.push({ time: sessionData[i].time, value: windowSum / (8 * 3600) });
                }
            }

            return { twa, oshaTwa };
        }

        function calculateTWA(hgData) {
            if (hgData.length === 0) return { twa: [], oshaTwa: [], sessions: [] };
            
            // Detect sessions based on gaps > 20 minutes
            const sessions = detectSessions(hgData);
            
            // Calculate TWA for each session separately
            const allTwa = [];
            const allOshaTwa = [];
            const sessionInfo = [];
            
            sessions.forEach((session, idx) => {
                const { twa, oshaTwa } = calculateTWAForSession(session);
                allTwa.push(...twa);
                allOshaTwa.push(...oshaTwa);
                
                // Store session boundaries for chart rendering
                sessionInfo.push({
                    index: idx,
                    startTime: session[0].time,
                    endTime: session[session.length - 1].time,
                    dataPoints: session.length,
                    finalTwa: oshaTwa.length > 0 ? oshaTwa[oshaTwa.length - 1].value : 0,
                });
            });

            return { twa: allTwa, oshaTwa: allOshaTwa, sessions: sessionInfo };
        }

        // ============================================
        // SERIAL COMMUNICATION CLASS
        // ============================================
        class MA1Serial {
            constructor() {
                this.port = null;
                this.reader = null;
                this.writer = null;
                this.lineBuffer = [];
                this.readBuffer = '';
                this.keepReading = false;
                this.onLineReceived = null;
                this.onDisconnect = null;
                this.echoEnabled = true;
                this._disconnecting = false;
                this._portOpen = false;
                this._readLoopRunning = false;
                this._disconnectHandler = null;
            }

            get isConnected() {
                return this._portOpen && this.port !== null;
            }

            async connect() {
                // If we have a stale connection, clean it up first
                if (this.port) {
                    console.log('Cleaning up stale connection before reconnect');
                    await this.disconnect();
                    await new Promise(r => setTimeout(r, 300));
                }

                try {
                    // Request port from user
                    this.port = await navigator.serial.requestPort();
                    
                    // Open with timeout — but also handle the case where open resolves
                    // after timeout by tracking state
                    let opened = false;
                    const openPromise = this.port.open({ 
                        baudRate: TERMINAL_BAUD,
                        bufferSize: 16384,  // Larger buffer for download reliability
                    }).then(() => { opened = true; });
                    
                    const timeoutPromise = new Promise((_, reject) => 
                        setTimeout(() => {
                            if (!opened) reject(new Error('Connection timeout - port may be in use'));
                        }, 8000)
                    );
                    
                    await Promise.race([openPromise, timeoutPromise]);
                    this._portOpen = true;
                    
                    // Toggle DTR/RTS to ensure clean device state (helps with USB-serial chips)
                    try {
                        await this.port.setSignals({ dataTerminalReady: false, requestToSend: false });
                        await new Promise(r => setTimeout(r, 100));
                        await this.port.setSignals({ dataTerminalReady: true, requestToSend: true });
                        await new Promise(r => setTimeout(r, 100));
                    } catch (e) {
                        // setSignals not supported on all platforms, non-fatal
                        console.log('DTR/RTS toggle not supported:', e.message);
                    }
                    
                    this.writer = this.port.writable.getWriter();
                    this.reader = this.port.readable.getReader();
                    this.keepReading = true;
                    this._disconnecting = false;
                    this.readBuffer = '';
                    this.lineBuffer = [];
                    
                    // Listen for USB disconnect events (only for our specific port)
                    this._disconnectHandler = (event) => {
                        // Only react if the disconnected port is our port
                        if (event.target === this.port) {
                            console.log('USB disconnect detected for our port');
                            this._portOpen = false;
                            this.keepReading = false;
                            if (this.onDisconnect) this.onDisconnect('USB cable disconnected');
                        }
                    };
                    navigator.serial.addEventListener('disconnect', this._disconnectHandler);
                    
                    this._startReadLoop();
                    
                    // Stabilization: send a newline to flush any partial command on the device,
                    // wait for any boot messages, then drain them
                    await new Promise(r => setTimeout(r, 200));
                    await this._safeWrite('\n');
                    await new Promise(r => setTimeout(r, 200));
                    this.clearLines();
                    
                    return true;
                } catch (error) {
                    // Clean up any partial connection
                    await this._forceCleanup();
                    
                    if (error.name === 'NotFoundError') {
                        throw new Error('No port selected. Please select a port to connect.');
                    }
                    throw error;
                }
            }

            _startReadLoop() {
                if (this._readLoopRunning) return;
                this._readLoopRunning = true;
                
                // Use a streaming decoder that handles partial multi-byte characters
                const decoder = new TextDecoder('utf-8', { fatal: false });
                
                const loop = async () => {
                    while (this.keepReading && this.reader) {
                        try {
                            const { value, done } = await this.reader.read();
                            if (done) {
                                console.log('Read loop: stream done signal');
                                break;
                            }
                            
                            // Decode with stream:true to handle split multi-byte chars
                            this.readBuffer += decoder.decode(value, { stream: true });
                            
                            // Process all complete lines
                            let newlineIndex;
                            while ((newlineIndex = this.readBuffer.indexOf('\n')) !== -1) {
                                const line = this.readBuffer.substring(0, newlineIndex).replace(/\r/g, '').trim();
                                this.readBuffer = this.readBuffer.substring(newlineIndex + 1);
                                
                                if (line) {
                                    if (this.echoEnabled) {
                                        console.log('RX:', line);
                                    }
                                    this.lineBuffer.push(line);
                                    if (this.onLineReceived) {
                                        this.onLineReceived(line);
                                    }
                                }
                            }
                            
                            // Safety: if readBuffer grows huge without newlines, something is wrong
                            if (this.readBuffer.length > 100000) {
                                console.warn('Read buffer overflow, clearing');
                                this.readBuffer = '';
                            }
                        } catch (error) {
                            if (this.keepReading && !this._disconnecting) {
                                console.error('Read loop error:', error);
                                // Don't treat read errors as disconnect - the base station USB 
                                // connection may still be valid even if monitor was swapped.
                                // Only the USB 'disconnect' event means actual USB disconnection.
                                // Try to restart the read loop after a brief pause.
                                await new Promise(r => setTimeout(r, 500));
                                if (this.keepReading && !this._disconnecting && this._portOpen) {
                                    console.log('Attempting to restart read loop after error...');
                                    // Release and re-acquire the reader
                                    try {
                                        if (this.reader) {
                                            await this.reader.releaseLock();
                                        }
                                        this.reader = this.port.readable.getReader();
                                        continue; // Restart the loop
                                    } catch (restartError) {
                                        console.error('Failed to restart reader:', restartError);
                                        // Only now do we give up
                                        if (this.onDisconnect) {
                                            this.onDisconnect(`Communication error: ${error.message}`);
                                        }
                                    }
                                }
                            }
                            break;
                        }
                    }
                    this._readLoopRunning = false;
                };
                
                loop();
            }

            async _safeWrite(text) {
                if (!this.writer || !this._portOpen) {
                    throw new Error('Not connected');
                }
                
                try {
                    const encoder = new TextEncoder();
                    await this.writer.write(encoder.encode(text));
                    
                    if (this.echoEnabled && text.trim()) {
                        console.log('TX:', text.trim());
                    }
                } catch (error) {
                    // Write failed — but don't immediately disconnect.
                    // The base station USB may still be connected even if the monitor was swapped.
                    // Try to re-acquire the writer once before giving up.
                    console.warn('Write error, attempting recovery:', error.message);
                    try {
                        if (this.writer) {
                            await this.writer.releaseLock();
                        }
                        this.writer = this.port.writable.getWriter();
                        const encoder = new TextEncoder();
                        await this.writer.write(encoder.encode(text));
                        console.log('Write recovery successful');
                        return;
                    } catch (retryError) {
                        console.error('Write recovery failed:', retryError);
                        // Now we can consider it a real disconnect
                        if (this.onDisconnect && !this._disconnecting) {
                            this.onDisconnect(`Write failed: ${error.message}`);
                        }
                        throw new Error(`Write failed (device may be disconnected): ${error.message}`);
                    }
                }
            }

            async write(text) {
                await this._safeWrite(text);
                // Inter-command delay for device processing
                await new Promise(resolve => setTimeout(resolve, 50));
            }

            getLine(timeout = 1000) {
                return new Promise((resolve) => {
                    if (this.lineBuffer.length > 0) {
                        resolve(this.lineBuffer.shift());
                        return;
                    }
                    
                    const startTime = Date.now();
                    const check = () => {
                        if (this.lineBuffer.length > 0) {
                            resolve(this.lineBuffer.shift());
                        } else if (!this._portOpen || !this.keepReading) {
                            resolve(''); // Port closed, don't wait
                        } else if (Date.now() - startTime >= timeout) {
                            resolve('');
                        } else {
                            setTimeout(check, 5); // Check more frequently (was 10ms)
                        }
                    };
                    
                    setTimeout(check, 5);
                });
            }

            // Get a line with retried write: sends the command, waits, retries on timeout
            async getLineWithRetry(command, timeout = 1000, maxRetries = 3) {
                for (let attempt = 0; attempt < maxRetries; attempt++) {
                    this.clearLines();
                    await this.write(command);
                    const line = await this.getLine(timeout);
                    if (line) return line;
                    
                    if (attempt < maxRetries - 1) {
                        console.log(`Retry ${attempt + 1}/${maxRetries} for command: ${command.trim()}`);
                        // Progressively longer delays between retries
                        await new Promise(r => setTimeout(r, 200 * (attempt + 1)));
                    }
                }
                return '';
            }

            clearLines() {
                this.lineBuffer = [];
            }

            async expect(sequence, timeout = 1000, onLine = null) {
                const startTime = Date.now();
                
                while (Date.now() - startTime < timeout) {
                    if (!this._portOpen) return false; // Bail if disconnected
                    
                    const remaining = timeout - (Date.now() - startTime);
                    const line = await this.getLine(Math.min(200, remaining));
                    
                    if (line) {
                        if (onLine) onLine(line);
                        if (line.includes(sequence)) {
                            return true;
                        }
                    }
                }
                
                return false;
            }

            async disconnect() {
                if (this._disconnecting) return; // Prevent re-entrant disconnect
                this._disconnecting = true;
                this.keepReading = false;
                
                // Remove USB disconnect listener
                if (this._disconnectHandler) {
                    navigator.serial.removeEventListener('disconnect', this._disconnectHandler);
                    this._disconnectHandler = null;
                }

                // Release reader with timeout protection
                if (this.reader) {
                    try {
                        // Cancel with timeout — reader.cancel() can hang if the device is unresponsive
                        await Promise.race([
                            this.reader.cancel(),
                            new Promise(r => setTimeout(r, 2000)),
                        ]);
                    } catch (e) { console.log('Reader cancel:', e.message); }
                    try { this.reader.releaseLock(); } catch (e) { console.log('Reader release:', e.message); }
                }

                // Release writer
                if (this.writer) {
                    try { this.writer.releaseLock(); } catch (e) { console.log('Writer release:', e.message); }
                }
                
                // Close port with timeout protection
                if (this.port && this._portOpen) {
                    try {
                        await Promise.race([
                            this.port.close(),
                            new Promise(r => setTimeout(r, 3000)),
                        ]);
                    } catch (e) { console.log('Port close:', e.message); }
                }
                
                this.port = null;
                this.reader = null;
                this.writer = null;
                this._portOpen = false;
                this._disconnecting = false;
                this.readBuffer = '';
            }

            // Hard cleanup for error recovery — doesn't try to be graceful
            async _forceCleanup() {
                this.keepReading = false;
                this._disconnecting = true;
                
                if (this._disconnectHandler) {
                    navigator.serial.removeEventListener('disconnect', this._disconnectHandler);
                    this._disconnectHandler = null;
                }
                
                try { if (this.reader) this.reader.releaseLock(); } catch (e) {}
                try { if (this.writer) this.writer.releaseLock(); } catch (e) {}
                try { if (this.port && this._portOpen) await this.port.close(); } catch (e) {}
                
                this.port = null;
                this.reader = null;
                this.writer = null;
                this._portOpen = false;
                this._disconnecting = false;
                this.readBuffer = '';
                this.lineBuffer = [];
            }

            async getVersion() {
                // Try multiple times with increasing timeouts
                for (let attempt = 0; attempt < 5; attempt++) {
                    this.clearLines();
                    // Send a newline first to clear any partial command
                    if (attempt > 0) {
                        await this._safeWrite('\n');
                        await new Promise(r => setTimeout(r, 100));
                        this.clearLines();
                    }
                    await this.write('version\n');
                    
                    // Wait progressively longer on retries
                    const timeout = 500 + (attempt * 300);
                    const line = await this.getLine(timeout);
                    const version = parseVersion(line);
                    if (version) return version;
                    
                    // Maybe the response came as a different line; drain buffer
                    for (let drain = 0; drain < 5; drain++) {
                        const extra = await this.getLine(100);
                        if (!extra) break;
                        const v = parseVersion(extra);
                        if (v) return v;
                    }
                }
                return null;
            }

            async getNumPagesData() {
                for (let attempt = 0; attempt < 5; attempt++) {
                    this.clearLines();
                    if (attempt > 0) {
                        await this._safeWrite('\n');
                        await new Promise(r => setTimeout(r, 100));
                        this.clearLines();
                    }
                    await this.write('num_pages_data\n');
                    
                    const timeout = 500 + (attempt * 300);
                    const line = await this.getLine(timeout);
                    const match = line.match(/^(\d+)$/);
                    if (match) return parseInt(match[1]);
                    
                    // Drain extra lines looking for the number
                    for (let drain = 0; drain < 5; drain++) {
                        const extra = await this.getLine(100);
                        if (!extra) break;
                        const m = extra.match(/^(\d+)$/);
                        if (m) return parseInt(m[1]);
                    }
                }
                return null;
            }

            async forceSuspendedMode() {
                // Send verbose 0 to stop debug output
                await this.write('verbose 0\n');
                await new Promise(r => setTimeout(r, 100));
                
                // Send halt to suspend device operations
                await this.write('halt\n');
                await new Promise(r => setTimeout(r, 100));
                
                // Wait for any in-flight data to arrive, then drain it
                // The device may have buffered output that's still being transmitted
                await new Promise(r => setTimeout(r, 300));
                
                // Clear the read buffer and any queued lines
                this.readBuffer = '';
                this.clearLines();
                
                // Wait a bit more and drain again to catch any stragglers
                await new Promise(r => setTimeout(r, 200));
                this.readBuffer = '';
                this.clearLines();
            }

            // Verify connection is alive by checking version
            async ping() {
                try {
                    this.clearLines();
                    await this._safeWrite('version\n');
                    const line = await this.getLine(1000);
                    return parseVersion(line) !== null || line.length > 0;
                } catch (e) {
                    return false;
                }
            }

            // Read current alarm levels from device
            // Strategy: set_alarm prints "was X, now Y" so we send a dummy value, parse the "was" value, then restore it
            async getCurrentAlarms() {
                const alarms = { low: null, high: null, twa: null };
                const defaultValues = { low: '0.1', high: '1.0', twa: '0.025' };
                
                try {
                    // Read and restore each alarm
                    for (const [key, alarmIndex] of [['low', 0], ['high', 1], ['twa', 2]]) {
                        this.clearLines();
                        
                        // Send a dummy set_alarm command to read the current value
                        await this.write(`set_alarm ${alarmIndex} ${defaultValues[key]}\n`);
                        
                        // Wait for response and parse it
                        let foundValue = null;
                        for (let i = 0; i < 10; i++) {
                            const line = await this.getLine(200);
                            if (!line) continue;
                            
                            // Look for pattern like "Low Alarm - was 0.050000, now 0.100000"
                            // or "High Alarm - was 0.100000, now 1.000000"
                            // or "TWA Alarm - was 0.025000, now 0.025000"
                            const match = line.match(/was\s+([\d.]+)/i);
                            if (match) {
                                foundValue = parseFloat(match[1]);
                                break;
                            }
                        }
                        
                        if (foundValue !== null) {
                            alarms[key] = foundValue;
                            
                            // If we changed it, restore the original value
                            if (Math.abs(foundValue - parseFloat(defaultValues[key])) > 0.0001) {
                                this.clearLines();
                                await this.write(`set_alarm ${alarmIndex} ${foundValue}\n`);
                                // Wait for confirmation
                                await this.getLine(300);
                            }
                        }
                    }
                } catch (e) {
                    console.error('Error reading alarms:', e);
                }
                
                return alarms;
            }
        }

                if (!viewRange.start || !viewRange.end || !data.length) {
                    return { hg: data, twa: twaData, osha: oshaTwaData };
                }
                
                // viewRange is in milliseconds (from chart)
                // data.time is in seconds (UTC)
                // Convert viewRange to seconds for comparison
                const startTs = viewRange.start / 1000;
                const endTs = viewRange.end / 1000;
                
                const filteredHg = data.filter(d => d.time >= startTs && d.time <= endTs);
                const filteredTwa = twaData.filter(d => d.time >= startTs && d.time <= endTs);
                const filteredOsha = oshaTwaData.filter(d => d.time >= startTs && d.time <= endTs);
                
                return {
                    hg: filteredHg,
                    twa: filteredTwa,
                    osha: filteredOsha,
                };
            }, [data, twaData, oshaTwaData, viewRange]);

            // Update displayed count whenever view range or data changes
            useEffect(() => {
                const displayed = getDisplayedData();
                setDisplayedCount(displayed.hg.length);
            }, [getDisplayedData]);

            // Reset view range when data changes completely (new data loaded)
            useEffect(() => {
                setViewRange({ start: null, end: null });
                setIsCustomRange(false);
                setDisplayedCount(data.length);
            }, [data.length]);

            // Format date for datetime-local input
            const formatDateForInput = (timestamp) => {
                if (!timestamp) return '';
                const date = new Date(timestamp);
                return date.toISOString().slice(0, 16);
            };

            // Parse datetime-local input to timestamp
            const parseInputDate = (dateStr) => {
                if (!dateStr) return null;
                return new Date(dateStr).getTime();
            };

            // Initialize input range when data changes
            useEffect(() => {
                if (data.length > 0) {
                    // data.time is UTC seconds, convert to local time for display
                    const startMs = data[0].time * 1000;
                    const endMs = data[data.length - 1].time * 1000;
                    setInputRange({
                        start: formatDateForInput(startMs),
                        end: formatDateForInput(endMs),

                }
            }, [data]);

            // Apply custom date range
            const applyDateRange = () => {
                const start = parseInputDate(inputRange.start);
                const end = parseInputDate(inputRange.end);
                
                if (start && end && start < end) {
                    setViewRange({ start, end });
                    setIsCustomRange(true);
                    
                    if (chartInstance.current) {
                        chartInstance.current.options.scales.x.min = start;
                        chartInstance.current.options.scales.x.max = end;
                        chartInstance.current.update();

            // Reset zoom to show all data

                setViewRange({ start: null, end: null });

                if (chartInstance.current) {
                    chartInstance.current.resetZoom();

                // Reset input fields to full data range

                    setInputRange({
                        start: formatDateForInput(data[0].time * 1000),
                        end: formatDateForInput(data[data.length - 1].time * 1000),

            // Export currently displayed range

                const displayed = getDisplayedData();
                if (displayed.hg.length === 0) {
                    return;

                // Create CSV content
                const header = 'Date,Time,Timezone,Hg Conc. (mg/m3)\n';
                const rows = displayed.hg.map(d => {
                    const date = new Date(d.time * 1000);
                    const dateStr = date.toLocaleDateString('en-US');
                    const timeStr = date.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
                    const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
                    return `${dateStr},${timeStr},${tz},${d.value}`;
                }).join('\n');
                
                const content = header + rows;
                
                // Generate filename with date range
                const startDate = new Date(displayed.hg[0].time * 1000).toISOString().slice(0, 10);
                const endDate = new Date(displayed.hg[displayed.hg.length - 1].time * 1000).toISOString().slice(0, 10);
                const defaultFilename = `MA1-Hg-${startDate}_to_${endDate}.csv`;
                
                // Try to use File System Access API for save dialog
                if ('showSaveFilePicker' in window) {
                    try {
                        const handle = await window.showSaveFilePicker({
                            suggestedName: defaultFilename,
                            types: [{
                                description: 'CSV Files',
                                accept: { 'text/csv': ['.csv'] },
                            }],
                        });
                        const writable = await handle.createWritable();
                        await writable.write(content);
                        await writable.close();
                        console.log(`Saved ${displayed.hg.length} points to ${handle.name}`);
                    } catch (err) {
                        if (err.name !== 'AbortError') {
                            // Actual error, fall back to download
                            downloadRangeFallback(content, defaultFilename);
                        }
                        // User cancelled - do nothing
                    }
                } else {
                    // Browser doesn't support File System Access API
                    downloadRangeFallback(content, defaultFilename);
                }
            };
            
            const downloadRangeFallback = (content, filename) => {
                const blob = new Blob([content], { type: 'text/csv' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;

                return () => {

        // ============================================

        const OSHA_CARTRIDGE_CAPACITY = 42; // mg·hr/m³

        function loadCartridgeData() {
            try {
                const raw = localStorage.getItem('ma1_cartridge_data');
                return raw ? JSON.parse(raw) : { workers: {} };
            } catch (e) {
                return { workers: {} };
            }
        }

        function saveCartridgeData(data) {
            localStorage.setItem('ma1_cartridge_data', JSON.stringify(data));
        }

        // Calculate cumulative dose from hg data: Σ(conc × Δt) in mg·hr/m³
        function calculateCumulativeDose(hgData) {
            if (hgData.length < 2) return 0;
            let dose = 0;
            for (let i = 1; i < hgData.length; i++) {
                const dt = (hgData[i].time - hgData[i - 1].time) / 3600; // seconds to hours
                if (dt > 0 && dt < 1) { // skip gaps > 1 hour
                    const avgConc = (hgData[i].value + hgData[i - 1].value) / 2;
                    dose += avgConc * dt;
                }
            }
            return dose;
        }

        function CartridgeTracker({ cartridgeData, onCartridgeDataChange, addLog, showToast }) {
            const [expandedWorker, setExpandedWorker] = useState(null);
            const [showNewCartridgeConfirm, setShowNewCartridgeConfirm] = useState(null);
            const [showDeleteConfirm, setShowDeleteConfirm] = useState(null);

            const workers = cartridgeData.workers || {};
            const workerIds = Object.keys(workers);

            const handleNewCartridge = (workerId) => {
                const updated = { ...cartridgeData };
                const worker = updated.workers[workerId];
                // Archive old cartridge
                if (!worker.cartridgeHistory) worker.cartridgeHistory = [];
                if (worker.cartridgeStart) {
                    worker.cartridgeHistory.push({
                        start: worker.cartridgeStart,
                        end: new Date().toISOString(),
                        finalDose: worker.cumulativeDose,
                        sessions: worker.sessions || [],
                    });
                }
                worker.cartridgeStart = new Date().toISOString();
                worker.cumulativeDose = 0;
                worker.sessions = [];
                onCartridgeDataChange(updated);
                setShowNewCartridgeConfirm(null);
                addLog(`New cartridge started for ${workerId}`, 'success');
                showToast(`New cartridge session started for ${workerId}`, 'success');
            };

            const handleDeleteWorker = (workerId) => {
                const updated = { ...cartridgeData };
                delete updated.workers[workerId];
                onCartridgeDataChange(updated);
                setShowDeleteConfirm(null);
                setExpandedWorker(null);
                addLog(`Removed worker ${workerId}`, 'warning');
            };

            if (workerIds.length === 0) {
                return (
                    <div style={{ textAlign: 'center', color: 'var(--text-muted)', padding: '12px 0' }}>
                        <Icons.Shield />
                        <p style={{ marginTop: '8px', fontSize: '13px' }}>No workers tracked yet</p>
                        <p style={{ fontSize: '12px' }}>Download or load data and assign a worker ID to begin tracking</p>
                    </div>
                );
            }

            return (
                <div style={{ display: 'flex', flexDirection: 'column', gap: '12px' }}>
                    {workerIds.map(id => {
                        const worker = workers[id];
                        const dose = worker.cumulativeDose || 0;
                        const pct = Math.min(100, (dose / OSHA_CARTRIDGE_CAPACITY) * 100);
                        const isExpanded = expandedWorker === id;
                        const isWarning = pct >= 50 && pct < 80;
                        const isDanger = pct >= 80;
                        const barColor = isDanger ? 'var(--accent-red)' : isWarning ? 'var(--accent-orange)' : 'var(--accent-green)';

                        return (
                            <div key={id} style={{
                                background: 'var(--bg-secondary)',
                                borderRadius: '10px',
                                border: isDanger ? '1px solid rgba(239, 68, 68, 0.4)' : '1px solid var(--border)',
                                overflow: 'hidden',
                            }}>
                                <div
                                    onClick={() => setExpandedWorker(isExpanded ? null : id)}
                                    style={{
                                        padding: '14px 16px',
                                        cursor: 'pointer',
                                        display: 'flex',
                                        flexDirection: 'column',
                                        gap: '8px',
                                    }}
                                >
                                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                                        <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                                            <Icons.User />
                                            <span style={{ fontWeight: '600', fontSize: '14px' }}>{id}</span>
                                        </div>
                                        <span style={{ 
                                            fontFamily: "'JetBrains Mono', monospace", 
                                            fontSize: '13px',
                                            color: barColor,
                                            fontWeight: '600',
                                        }}>
                                            {pct.toFixed(1)}%
                                        </span>
                                    </div>

                                    {/* Progress bar */}
                                    <div style={{
                                        width: '100%',
                                        height: '8px',
                                        background: 'var(--bg-primary)',
                                        borderRadius: '4px',
                                        overflow: 'hidden',
                                    }}>
                                        <div style={{
                                            width: `${pct}%`,
                                            height: '100%',
                                            background: barColor,
                                            borderRadius: '4px',
                                            transition: 'width 0.5s ease',
                                        }} />
                                    </div>

                                    <div style={{ 
                                        display: 'flex', 
                                        justifyContent: 'space-between', 
                                        fontSize: '11px', 
                                        color: 'var(--text-muted)',
                                        fontFamily: "'JetBrains Mono', monospace",
                                    }}>
                                        <span>{dose.toFixed(3)} mg·hr/m³</span>
                                        <span>/ {OSHA_CARTRIDGE_CAPACITY} mg·hr/m³ OSHA capacity</span>
                                    </div>

                                    {isDanger && (
                                        <div style={{
                                            display: 'flex',
                                            alignItems: 'center',
                                            gap: '6px',
                                            fontSize: '12px',
                                            color: 'var(--accent-red)',
                                            fontWeight: '600',
                                        }}>
                                            <Icons.AlertTriangle />
                                            {pct >= 100 ? 'Cartridge capacity exceeded — replace immediately' : 'Cartridge approaching capacity — plan replacement'}
                                        </div>
                                    )}
                                </div>

                                {isExpanded && (
                                    <div style={{
                                        borderTop: '1px solid var(--border)',
                                        padding: '14px 16px',
                                        display: 'flex',
                                        flexDirection: 'column',
                                        gap: '10px',
                                    }}>
                                        <div style={{ fontSize: '12px', color: 'var(--text-muted)' }}>
                                            <div>Cartridge started: {worker.cartridgeStart ? new Date(worker.cartridgeStart).toLocaleString() : 'Not set'}</div>
                                            <div>Sessions recorded: {(worker.sessions || []).length}</div>
                                            {worker.cartridgeHistory && worker.cartridgeHistory.length > 0 && (
                                                <div>Previous cartridges: {worker.cartridgeHistory.length}</div>
                                            )}
                                        </div>

                                        {/* Session history */}
                                        {(worker.sessions || []).length > 0 && (
                                            <div style={{ maxHeight: '120px', overflowY: 'auto' }}>
                                                <div style={{ fontSize: '11px', color: 'var(--text-muted)', textTransform: 'uppercase', marginBottom: '4px' }}>
                                                    Session Log
                                                </div>
                                                {worker.sessions.map((s, i) => (
                                                    <div key={i} style={{
                                                        fontSize: '11px',
                                                        fontFamily: "'JetBrains Mono', monospace",
                                                        color: 'var(--text-secondary)',
                                                        padding: '3px 0',
                                                        borderBottom: '1px solid var(--border)',
                                                    }}>
                                                        {new Date(s.date).toLocaleDateString()} — +{s.dose.toFixed(4)} mg·hr/m³ ({s.readings} readings, {s.durationMin}m)
                                                    </div>
                                                ))}
                                            </div>
                                        )}

                                        <div style={{ display: 'flex', gap: '8px' }}>
                                            <button
                                                onClick={(e) => { e.stopPropagation(); setShowNewCartridgeConfirm(id); }}
                                                style={{
                                                    ...styles.button('success'),
                                                    padding: '8px 12px',
                                                    fontSize: '12px',
                                                }}
                                            >
                                                <Icons.RefreshCw />
                                                New Cartridge
                                            </button>
                                            <button
                                                onClick={(e) => { e.stopPropagation(); setShowDeleteConfirm(id); }}
                                                style={{
                                                    ...styles.button('danger'),
                                                    padding: '8px 12px',
                                                    fontSize: '12px',
                                                }}
                                            >
                                                <Icons.Trash />
                                                Remove
                                            </button>
                                        </div>
                                    </div>
                                )}

                                {/* Confirm modals */}
                                {showNewCartridgeConfirm === id && (
                                    <ConfirmModal
                                        title="Start New Cartridge"
                                        message={`Reset cumulative dose for ${id} and start a new cartridge tracking session? The current cartridge data (${dose.toFixed(3)} mg·hr/m³) will be archived.`}
                                        confirmText="Start New Cartridge"
                                        onConfirm={() => handleNewCartridge(id)}
                                        onCancel={() => setShowNewCartridgeConfirm(null)}
                                    />
                                )}
                                {showDeleteConfirm === id && (
                                    <ConfirmModal
                                        title="Remove Worker"
                                        message={`Remove worker ${id} and all cartridge tracking data? This cannot be undone.`}
                                        confirmText="Remove Worker"
                                        danger={true}
                                        onConfirm={() => handleDeleteWorker(id)}
                                        onCancel={() => setShowDeleteConfirm(null)}
                                    />
                                )}
                            </div>
                        );
                    })}
                </div>
            );
        }

        // ============================================
        // MAIN APP
        // ============================================
        function App() {
            // Connection state
            const [connected, setConnected] = useState(false);
            const [version, setVersion] = useState(null);
            const [busy, setBusy] = useState(false);
            const [progress, setProgress] = useState(0);
            const [statusMessage, setStatusMessage] = useState('');
            
            // Data state
            const [hgData, setHgData] = useState([]);
            const [twaData, setTwaData] = useState([]);
            const [oshaTwaData, setOshaTwaData] = useState([]);
            const [sessions, setSessions] = useState([]);
            const [logs, setLogs] = useState([]);
            
            // Current device alarm levels
            const [currentAlarms, setCurrentAlarms] = useState({ low: '0.1', high: '1.0', twa: '0.025' });
            const [alarmLoading, setAlarmLoading] = useState(false);
            
            // Toast state
            const [toasts, setToasts] = useState([]);
            const toastIdRef = useRef(0);
            
            // Modal state
            const [showAlarmModal, setShowAlarmModal] = useState(false);
            const [showTimesyncModal, setShowTimesyncModal] = useState(false);
            const [showEraseModal, setShowEraseModal] = useState(false);
            const [dataDownloaded, setDataDownloaded] = useState(false);
            
            // Serial reference
            const serialRef = useRef(new MA1Serial());

            // Cartridge tracking state
            const [cartridgeData, setCartridgeData] = useState(() => loadCartridgeData());
            const [showWorkerModal, setShowWorkerModal] = useState(false);
            const [lastWorkerId, setLastWorkerId] = useState('');
            const [pendingDataForWorker, setPendingDataForWorker] = useState(null);
            
            // Recovery data state - check localStorage for unsaved downloads
            const [hasRecoveryData, setHasRecoveryData] = useState(() => {
                try {
                    const saved = localStorage.getItem('ma1_recovery_data');
                    if (saved) {
                        const data = JSON.parse(saved);
                        // Check if data is less than 24 hours old
                        if (data.timestamp && (Date.now() - data.timestamp) < 24 * 60 * 60 * 1000) {
                            return true;
                        } else {
                            localStorage.removeItem('ma1_recovery_data');
                        }
                    }
                } catch (e) {}
                return false;
            });

            // Check Web Serial support
            const webSerialSupported = 'serial' in navigator;

            const addLog = useCallback((message, type = 'info') => {
                const time = new Date().toLocaleTimeString();
                setLogs(prev => [...prev.slice(-100), { time, message, type }]);
            }, []);

            const showToast = useCallback((message, type = 'info') => {
                const id = ++toastIdRef.current;
                setToasts(prev => [...prev, { id, message, type }]);
            }, []);

            const removeToast = useCallback((id) => {
                setToasts(prev => prev.filter(t => t.id !== id));
            }, []);
            
            // Save download data to localStorage for recovery
            const saveRecoveryData = useCallback((rawLines, hgCsvContent, fileHeader) => {
                try {
                    const recoveryData = {
                        timestamp: Date.now(),
                        rawLog: rawLines.join('\n'),
                        hgCsv: hgCsvContent,
                        fileHeader: fileHeader,
                    };
                    localStorage.setItem('ma1_recovery_data', JSON.stringify(recoveryData));
                    setHasRecoveryData(true);
                } catch (e) {
                    console.warn('Could not save recovery data:', e);
                }
            }, []);
            
            // Clear recovery data after successful save
            const clearRecoveryData = useCallback(() => {
                try {
                    localStorage.removeItem('ma1_recovery_data');
                    setHasRecoveryData(false);
                } catch (e) {}
            }, []);
            
            // Recover and re-download the last saved data
            const handleRecoverData = useCallback(() => {
                try {
                    const saved = localStorage.getItem('ma1_recovery_data');
                    if (!saved) {
                        showToast('No recovery data found', 'warning');
                        return;
                    }
                    
                    const data = JSON.parse(saved);
                    const timestamp = new Date(data.timestamp);
                    const timeStr = timestamp.toLocaleString();
                    
                    addLog(`Recovering data from ${timeStr}...`, 'info');
                    
                    // Generate filenames based on recovery time
                    const hgFilename = generateFilename(data.fileHeader, 'csv', 'Hg-RECOVERED');
                    const logFilename = generateFilename(data.fileHeader, 'txt', 'Log-RECOVERED');
                    
                    // Download both files
                    if (data.hgCsv) {
                        downloadFallback(data.hgCsv, hgFilename);
                        addLog(`Recovered Hg data to ${hgFilename}`, 'success');
                    }
                    
                    if (data.rawLog) {
                        downloadFallback(data.rawLog, logFilename);
                        addLog(`Recovered raw log to ${logFilename}`, 'success');
                    }
                    
                    showToast('Recovery files downloaded! You can now clear recovery data.', 'success');
                    
                } catch (e) {
                    addLog(`Recovery failed: ${e.message}`, 'error');
                    showToast('Failed to recover data', 'error');
                }
            }, [addLog, showToast]);

            const handleCartridgeDataChange = useCallback((data) => {
                setCartridgeData(data);
                saveCartridgeData(data);
            }, []);

            const assignDataToWorker = useCallback((workerId, hgDataToAssign) => {
                if (!workerId || !hgDataToAssign || hgDataToAssign.length < 2) return;

                const dose = calculateCumulativeDose(hgDataToAssign);
                const durationMin = Math.round((hgDataToAssign[hgDataToAssign.length - 1].time - hgDataToAssign[0].time) / 60);

                const updated = { ...cartridgeData };
                if (!updated.workers[workerId]) {
                    updated.workers[workerId] = {
                        cartridgeStart: new Date().toISOString(),
                        cumulativeDose: 0,
                        sessions: [],
                        cartridgeHistory: [],
                    };
                    addLog(`New worker "${workerId}" added to cartridge tracker`, 'success');
                }

                const worker = updated.workers[workerId];
                worker.cumulativeDose = (worker.cumulativeDose || 0) + dose;
                if (!worker.sessions) worker.sessions = [];
                worker.sessions.push({
                    date: new Date().toISOString(),
                    dose: dose,
                    readings: hgDataToAssign.length,
                    durationMin: durationMin,
                    startTime: new Date(hgDataToAssign[0].time * 1000).toISOString(),
                    endTime: new Date(hgDataToAssign[hgDataToAssign.length - 1].time * 1000).toISOString(),
                });

                handleCartridgeDataChange(updated);
                setLastWorkerId(workerId);

                const pct = (worker.cumulativeDose / OSHA_CARTRIDGE_CAPACITY * 100);
                addLog(`Cartridge dose for ${workerId}: +${dose.toFixed(4)} mg·hr/m³ (total: ${worker.cumulativeDose.toFixed(3)}, ${pct.toFixed(1)}% of OSHA capacity)`, 
                    pct >= 80 ? 'warning' : 'success');

                if (pct >= 100) {
                    showToast(`⚠️ ${workerId}: Cartridge capacity EXCEEDED (${pct.toFixed(0)}%) — replace immediately!`, 'error');
                } else if (pct >= 80) {
                    showToast(`⚠️ ${workerId}: Cartridge at ${pct.toFixed(0)}% capacity — plan replacement`, 'warning');
                } else {
                    showToast(`${workerId}: Cartridge at ${pct.toFixed(1)}% capacity`, 'success');
                }
            }, [cartridgeData, handleCartridgeDataChange, addLog, showToast]);

            const handleConnect = async () => {
                if (!webSerialSupported) {
                    addLog('Web Serial API not supported. Use Chrome or Edge.', 'error');
                    return;
                }

                try {
                    setBusy(true);
                    setStatusMessage('Connecting...');
                    addLog('Requesting serial port...');
                    
                    // Set up disconnect handler before connecting
                    serialRef.current.onDisconnect = (reason) => {
                        addLog(`Device disconnected: ${reason}`, 'error');
                        showToast(`Device disconnected: ${reason}`, 'error');
                        setConnected(false);
                        setVersion(null);
                        setBusy(false);
                        setStatusMessage('');
                        setProgress(0);
                        // Ensure echoEnabled is restored
                        serialRef.current.echoEnabled = true;
                    };
                    
                    await serialRef.current.connect();
                    addLog('Port opened, checking firmware version...');
                    
                    // Put device in a known state before anything else
                    await serialRef.current.forceSuspendedMode();
                    addLog('Device halted, querying version...');
                    
                    const ver = await serialRef.current.getVersion();
                    if (!ver) {
                        throw new Error('Could not get firmware version after 5 attempts. Device may not be responding.\n\nTry: unplug USB, wait 3 seconds, plug back in, then Connect again.');
                    }
                    
                    addLog(`Firmware version: ${versionToString(ver)}`, 'success');
                    
                    if (compareVersions(ver, MINIMUM_VERSION) < 0) {
                        throw new Error(`Firmware upgrade required. Current: ${versionToString(ver)}, Required: ${versionToString(MINIMUM_VERSION)}`);
                    }
                    
                    addLog('Device ready', 'success');
                    showToast('Connected to MA-1', 'success');
                    
                    setVersion(ver);
                    setConnected(true);
                    setStatusMessage('');
                } catch (error) {
                    let errorMsg = error.message;
                    let troubleshooting = '';
                    
                    if (error.message.includes('Failed to open serial port') || error.message.includes('port may be in use')) {
                        troubleshooting = '\n\nTroubleshooting:\n• Close any other apps using the port (Arduino IDE, PuTTY, other serial monitors)\n• Unplug and replug the USB cable, wait 3 seconds\n• Try a different USB port\n• On Mac: check if another process has the port (lsof | grep usbserial)';
                    } else if (error.message.includes('No port selected')) {
                        troubleshooting = '\n\nYou must select a port from the browser dialog to connect.';
                    } else if (error.message.includes('Access denied') || error.message.includes('permission')) {
                        troubleshooting = '\n\nTroubleshooting:\n• On Linux: add your user to the dialout group\n• On Mac: check System Preferences > Security & Privacy\n• Try running browser as administrator (Windows)';
                    } else if (error.message.includes('Could not get firmware version')) {
                        // Already has troubleshooting in the message
                    }
                    
                    addLog(`Connection failed: ${errorMsg}${troubleshooting}`, 'error');
                    showToast('Connection failed - see log for details', 'error');
                    await serialRef.current.disconnect();
                    setConnected(false);
                    setVersion(null);
                } finally {
                    setBusy(false);
                }
            };

            const handleDisconnect = async () => {
                serialRef.current.echoEnabled = true; // Restore in case mid-download
                await serialRef.current.disconnect();
                setConnected(false);
                setVersion(null);
                setBusy(false);
                setStatusMessage('');
                setProgress(0);
                addLog('Disconnected');
            };

            const handleDownload = async () => {
                const MAX_DOWNLOAD_RETRIES = 3;
                const MAX_CONSECUTIVE_TIMEOUTS = 15;
                const LINE_TIMEOUT = 3000;         // 3s per line (was 2s)
                const OVERALL_TIMEOUT = 600000;     // 10 minutes overall
                const STALL_RECOVERY_DELAY = 500;
                
                let downloadAttempt = 0;
                let finalLines = null;
                
                while (downloadAttempt < MAX_DOWNLOAD_RETRIES && !finalLines) {
                    downloadAttempt++;
                    
                    try {
                        setBusy(true);
                        setProgress(0);
                        
                        if (downloadAttempt > 1) {
                            setStatusMessage(`Download retry ${downloadAttempt}/${MAX_DOWNLOAD_RETRIES}...`);
                            addLog(`Download attempt ${downloadAttempt}/${MAX_DOWNLOAD_RETRIES}...`, 'warning');
                            
                            // Re-stabilize the device before retry
                            await new Promise(r => setTimeout(r, 500));
                            serialRef.current.clearLines();
                            serialRef.current.readBuffer = '';
                            
                            try {
                                await serialRef.current.forceSuspendedMode();
                            } catch (e) {
                                addLog(`Could not halt device: ${e.message}`, 'warning');
                            }
                            await new Promise(r => setTimeout(r, 300));
                        } else {
                            setStatusMessage('Downloading data...');
                            addLog('Starting data download...');
                        }
                        
                        // Verify connection is alive before starting download
                        if (!serialRef.current.isConnected) {
                            throw new Error('Device is not connected');
                        }
                        
                        // Ensure device is in a clean state
                        await serialRef.current.forceSuspendedMode();
                        
                        const numPages = await serialRef.current.getNumPagesData();
                        if (numPages === null && downloadAttempt === 1) {
                            addLog('Could not determine page count — download will proceed without progress tracking', 'warning');
                        } else if (numPages !== null) {
                            addLog(`Found ${numPages} pages of data`);
                        }
                        
                        if (numPages === 0) {
                            addLog('Device reports 0 pages of data', 'warning');
                            showToast('No data on device', 'warning');
                            finalLines = [];
                            break;
                        }
                        
                        // Clear buffers before starting dump
                        serialRef.current.clearLines();
                        serialRef.current.readBuffer = '';
                        
                        await serialRef.current.write('dump_data_paged\n');
                        serialRef.current.echoEnabled = false;
                        
                        const lines = [];
                        const startTime = Date.now();
                        let consecutiveTimeouts = 0;
                        let lastPageSeen = -1;
                        let lastProgressTime = Date.now();
                        
                        let done = false;
                        while (!done) {
                            // Check if device is still connected
                            if (!serialRef.current.isConnected) {
                                throw new Error('Device disconnected during download');
                            }
                            
                            const line = await serialRef.current.getLine(LINE_TIMEOUT);
                            
                            if (!line) {
                                consecutiveTimeouts++;
                                
                                // Check overall timeout
                                if (Date.now() - startTime > OVERALL_TIMEOUT) {
                                    throw new Error('Download exceeded maximum time (10 minutes)');
                                }
                                
                                // If we've had too many consecutive timeouts, the device may have stalled
                                if (consecutiveTimeouts >= MAX_CONSECUTIVE_TIMEOUTS) {
                                    const stallDuration = ((consecutiveTimeouts * LINE_TIMEOUT) / 1000).toFixed(0);
                                    addLog(`No data received for ${stallDuration}s — device may have stalled`, 'warning');
                                    
                                    // If we have some data, maybe the device finished without the end marker
                                    if (lines.length > 0 && consecutiveTimeouts >= MAX_CONSECUTIVE_TIMEOUTS * 2) {
                                        addLog(`Assuming download complete after extended silence (${lines.length} lines received)`, 'warning');
                                        done = true;
                                        break;
                                    }
                                    
                                    // Try to prod the device
                                    if (consecutiveTimeouts === MAX_CONSECUTIVE_TIMEOUTS) {
                                        addLog('Attempting stall recovery — sending newline to device...', 'warning');
                                        try {
                                            await serialRef.current._safeWrite('\n');
                                        } catch (e) {
                                            throw new Error('Cannot communicate with device during stall recovery');
                                        }
                                    }
                                    
                                    // Give up on this attempt after extended silence
                                    if (consecutiveTimeouts >= MAX_CONSECUTIVE_TIMEOUTS * 3) {
                                        throw new Error(`Device stalled (no data for ${stallDuration}s). ${lines.length} lines received before stall.`);
                                    }
                                }
                                
                                continue;
                            }
                            
                            // Got data — reset timeout counter
                            consecutiveTimeouts = 0;
                            lastProgressTime = Date.now();
                            
                            if (line.startsWith('Page')) {
                                const match = line.match(/Page (\d+)/);
                                if (match) {
                                    const currentPage = parseInt(match[1]);
                                    lastPageSeen = currentPage;
                                    if (numPages) {
                                        setProgress(Math.min(99, (currentPage / numPages) * 100));
                                    }
                                }
                            } else if (line.includes('No data found at page')) {
                                done = true;
                            } else if (line.includes('ERROR') || line.includes('error')) {
                                addLog(`Device error during download: ${line}`, 'warning');
                                // Don't immediately fail — might be a recoverable warning
                            } else {
                                // Validate line format - should have commas for data lines
                                // Skip obviously truncated/corrupted lines
                                if (line.includes(',') || line.startsWith('SerialNo') || line.startsWith('Calibrated') || line === 'timestamp,value,type') {
                                    lines.push(line);
                                } else if (line.trim().length > 0 && !line.startsWith('Page')) {
                                    addLog(`Skipping malformed line: ${line.substring(0, 30)}...`, 'warning');
                                }
                            }
                        }
                        
                        serialRef.current.echoEnabled = true;
                        
                        if (lines.length === 0 && downloadAttempt < MAX_DOWNLOAD_RETRIES) {
                            addLog(`Download returned 0 data lines — retrying...`, 'warning');
                            continue; // Retry the download
                        }
                        
                        finalLines = lines;
                        addLog(`Downloaded ${lines.length} raw lines in ${((Date.now() - startTime) / 1000).toFixed(1)}s`, 'success');
                        
                    } catch (error) {

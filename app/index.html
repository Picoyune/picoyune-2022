                        serialRef.current.echoEnabled = true;
                        
                        if (downloadAttempt < MAX_DOWNLOAD_RETRIES && serialRef.current.isConnected) {
                            addLog(`Download attempt ${downloadAttempt} failed: ${error.message}`, 'warning');
                            addLog('Will retry after brief recovery pause...', 'warning');
                            await new Promise(r => setTimeout(r, 1000));
                        } else {
                            addLog(`Download failed: ${error.message}`, 'error');
                            showToast(`Download failed: ${error.message}`, 'error');
                            setBusy(false);
                            setStatusMessage('');
                            setProgress(0);
                            return;
                        }
                    }
                }
                
                // Process the downloaded data
                if (!finalLines || finalLines.length === 0) {
                    addLog('No data lines received after all attempts', 'warning');
                    showToast('Download complete but no data received', 'warning');
                    setBusy(false);
                    setStatusMessage('');
                    setProgress(0);
                    return;
                }
                
                try {
                    // Process data
                    const { hgData: processedHg, fileHeader, calHeader } = processFileLines(finalLines);
                    const { twa, oshaTwa, sessions: sessionInfo } = calculateTWA(processedHg);
                    
                    setHgData(processedHg);
                    setTwaData(twa);
                    setOshaTwaData(oshaTwa);
                    setSessions(sessionInfo);
                    setDataDownloaded(true);
                    
                    if (processedHg.length > 0) {
                        addLog(`Processed ${processedHg.length} mercury readings in ${sessionInfo.length} session(s)`, 'success');
                        const finalTwa = oshaTwa[oshaTwa.length - 1]?.value || 0;
                        addLog(`Final 8hr TWA: ${finalTwa.toFixed(4)} mg/m³`);
                        
                        // Store data for worker assignment after save
                        setPendingDataForWorker(processedHg);
                        
                        // Create CSV content with mercury data
                        const csvHeader = 'Date,Time,Timezone,Hg Conc. (mg/m3)\n';
                        const csvRows = processedHg.map(d => {
                            const date = new Date(d.time * 1000);
                            const dateStr = date.toLocaleDateString('en-US');
                            const timeStr = date.toLocaleTimeString('en-US', { 
                                hour: '2-digit', 
                                minute: '2-digit', 
                                hour12: false 
                            });
                            const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
                            return `${dateStr},${timeStr},${tz},${d.value}`;
                        }).join('\n');
                        
                        // Add file header and calibration info if available
                        let fileContent = '';
                        if (fileHeader && fileHeader !== 'None') {
                            fileContent += fileHeader + '\n';
                        }
                        if (calHeader && calHeader !== 'None') {
                            // Parse calibration timestamp if present
                            const calMatch = calHeader.match(/Calibrated (\d+)/);
                            if (calMatch) {
                                const calDate = new Date(parseInt(calMatch[1]) * 1000);
                                fileContent += `Calibrated on ${calDate.toLocaleDateString('en-US')}\n`;
                            } else {
                                fileContent += calHeader + '\n';
                            }
                        }
                        fileContent += csvHeader + csvRows;
                        
                        // Save to localStorage for recovery before attempting file downloads
                        saveRecoveryData(finalLines, fileContent, fileHeader);
                        
                        // Generate filename with date, time, and serial number
                        const defaultFilename = generateFilename(fileHeader, 'csv', 'Hg');
                        
                        // Use direct download - showSaveFilePicker fails after long downloads
                        // because the user gesture is considered "stale" by Chrome
                        downloadFallback(fileContent, defaultFilename);
                        addLog(`Saved mercury data to ${defaultFilename}`, 'success');
                        showToast(`Downloaded ${processedHg.length} readings`, 'success');
                        
                        // Also save raw log file
                        const rawLogContent = finalLines.join('\n');
                        const rawLogFilename = generateFilename(fileHeader, 'txt', 'Log');
                        downloadFallback(rawLogContent, rawLogFilename);
                        addLog(`Saved raw log to ${rawLogFilename}`, 'success');
                        
                        // Clear recovery data after successful downloads
                        clearRecoveryData();
                        
                        // Show worker ID modal for cartridge tracking
                        setShowWorkerModal(true);
                    } else {
                        addLog('No mercury data found in download', 'warning');
                        showToast('Download complete but no mercury data found', 'warning');
                    }
                    
                    setProgress(100);
                    setStatusMessage('Download complete');
                    
                } catch (error) {
                    addLog(`Download failed: ${error.message}`, 'error');
                    showToast(`Download failed: ${error.message}`, 'error');
                    serialRef.current.echoEnabled = true;
                } finally {
                    setBusy(false);
                    setTimeout(() => {
                        setStatusMessage('');
                        setProgress(0);
                    }, 2000);
                }
            };
            
            // Fallback download function for browsers without File System Access API
            const downloadFallback = (content, filename) => {
                const blob = new Blob([content], { type: 'text/csv' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                a.click();
                URL.revokeObjectURL(url);
            };

            const handleTimesync = async () => {
                try {
                    if (!serialRef.current.isConnected) throw new Error('Device is not connected');
                    setBusy(true);
                    setStatusMessage('Syncing time...');
                    
                    const timestamp = getCurrentUTCTimestamp();
                    await serialRef.current.write(`set_time ${timestamp}\n`);
                    
                    if (await serialRef.current.expect('Time successfully set', 5000)) {
                        const timeStr = new Date().toLocaleString();
                        addLog(`Time synced to ${timeStr}`, 'success');
                        showToast(`Device time synced to ${timeStr}`, 'success');
                    } else {
                        throw new Error('Timesync response timeout');
                    }
                    
                    setShowTimesyncModal(false);
                } catch (error) {
                    addLog(`Timesync failed: ${error.message}`, 'error');
                    showToast(`Timesync failed: ${error.message}`, 'error');
                } finally {
                    setBusy(false);
                    setStatusMessage('');
                }
            };

            const handleSetAlarms = async (lowAlarm, highAlarm, twaAlarm) => {
                try {
                    if (!serialRef.current.isConnected) throw new Error('Device is not connected');
                    setBusy(true);
                    setStatusMessage('Setting alarms...');
                    
                    // Validate inputs
                    const lowVal = parseFloat(lowAlarm);
                    const highVal = parseFloat(highAlarm);
                    const twaVal = parseFloat(twaAlarm);
                    
                    if (isNaN(lowVal) || isNaN(highVal) || isNaN(twaVal)) {
                        throw new Error('Invalid alarm values');
                    }
                    
                    await serialRef.current.write(`set_alarm 0 ${lowAlarm}\n`);
                    await serialRef.current.write(`set_alarm 1 ${highAlarm}\n`);
                    await serialRef.current.write(`set_alarm 2 ${twaAlarm}\n`);
                    
                    if (await serialRef.current.expect('Alarm', 5000)) {
                        addLog(`Alarms set: LOW=${lowAlarm}, HIGH=${highAlarm}, 8hr TWA=${twaAlarm} mg/m³`, 'success');
                        showToast(`Alarms updated successfully!\nLow: ${lowAlarm} | High: ${highAlarm} | TWA: ${twaAlarm} mg/m³`, 'success');
                        // Update current alarms state
                        setCurrentAlarms({ low: lowAlarm, high: highAlarm, twa: twaAlarm });
                    } else {
                        throw new Error('Alarm update response timeout');
                    }
                    
                    setShowAlarmModal(false);
                } catch (error) {
                    addLog(`Alarm update failed: ${error.message}`, 'error');
                    showToast(`Alarm update failed: ${error.message}`, 'error');
                } finally {
                    setBusy(false);
                    setStatusMessage('');
                }
            };

            // Open alarm modal and fetch current alarm levels from device
            const openAlarmModal = async () => {
                setShowAlarmModal(true);
                setAlarmLoading(true);
                
                try {
                    if (!serialRef.current.isConnected) {
                        throw new Error('Device not connected');
                    }
                    
                    addLog('Reading current alarm levels from device...');
                    const alarms = await serialRef.current.getCurrentAlarms();
                    
                    if (alarms.low !== null || alarms.high !== null || alarms.twa !== null) {
                        setCurrentAlarms({
                            low: alarms.low !== null ? alarms.low.toString() : '0.1',
                            high: alarms.high !== null ? alarms.high.toString() : '1.0',
                            twa: alarms.twa !== null ? alarms.twa.toString() : '0.025',
                        });
                        addLog(`Current alarms: LOW=${alarms.low}, HIGH=${alarms.high}, TWA=${alarms.twa} mg/m³`, 'success');
                    } else {
                        addLog('Could not read alarm levels, using defaults', 'warning');
                    }
                } catch (error) {
                    addLog(`Failed to read alarms: ${error.message}`, 'warning');
                } finally {
                    setAlarmLoading(false);
                }
            };

            // Quick Sync: Download data, erase (if successful), then sync time
            const handleQuickSync = async () => {
                if (!serialRef.current.isConnected) {
                    showToast('Device not connected', 'error');
                    return;
                }
                
                addLog('Starting Quick Sync: Download → Erase → Time Sync', 'info');
                showToast('Starting Quick Sync...', 'info');
                
                let downloadSuccess = false;
                let fileHeader = null;
                
                // Step 1: Download data
                try {
                    setBusy(true);
                    setProgress(0);
                    setStatusMessage('Quick Sync: Preparing device...');
                    addLog('Step 1/3: Downloading data...');
                    
                    // Halt the device before download to prevent data corruption
                    await serialRef.current.forceSuspendedMode();
                    await new Promise(r => setTimeout(r, 200));
                    
                    setStatusMessage('Quick Sync: Downloading data...');
                    
                    const numPages = await serialRef.current.getNumPagesData();
                    addLog(`Found ${numPages || 'unknown'} pages of data`);
                    
                    await serialRef.current.write('dump_data_paged\n');
                    serialRef.current.echoEnabled = false;
                    
                    const lines = [];
                    const startTime = Date.now();
                    let consecutiveTimeouts = 0;
                    const MAX_CONSECUTIVE_TIMEOUTS = 10;
                    
                    let done = false;
                    while (!done) {
                        const line = await serialRef.current.getLine(3000);
                        
                        if (!line) {
                            consecutiveTimeouts++;
                            if (consecutiveTimeouts > MAX_CONSECUTIVE_TIMEOUTS) {
                                throw new Error('Download stalled - too many consecutive timeouts');
                            }
                            if (Date.now() - startTime > 600000) {
                                throw new Error('Download timeout');
                            }
                            continue;
                        }
                        
                        consecutiveTimeouts = 0; // Reset on successful read
                        
                        if (line.startsWith('Page')) {
                            const match = line.match(/Page (\d+)/);
                            if (match && numPages) {
                                const currentPage = parseInt(match[1]);
                                setProgress(Math.min(33, (currentPage / numPages) * 33));
                            }
                        } else if (line.includes('No data found at page')) {
                            done = true;
                        } else {
                            // Validate line format - should have commas for data lines
                            // Skip obviously truncated/corrupted lines
                            if (line.includes(',') || line.startsWith('SerialNo') || line.startsWith('Calibrated') || line === 'timestamp,value,type') {
                                lines.push(line);
                            } else if (line.trim().length > 0) {
                                addLog(`Skipping malformed line: ${line.substring(0, 30)}...`, 'warning');
                            }
                        }
                    }
                    
                    serialRef.current.echoEnabled = true;
                    addLog(`Downloaded ${lines.length} raw lines`, 'success');
                    
                    // Process data
                    const { hgData: processedHg, fileHeader, calHeader } = processFileLines(lines);
                    const { twa, oshaTwa, sessions: sessionInfo } = calculateTWA(processedHg);
                    
                    setHgData(processedHg);
                    setTwaData(twa);
                    setOshaTwaData(oshaTwa);
                    setSessions(sessionInfo);
                    setDataDownloaded(true);
                    
                    if (processedHg.length > 0) {
                        addLog(`Processed ${processedHg.length} mercury readings in ${sessionInfo.length} session(s)`, 'success');
                        
                        // Create and save CSV
                        const csvHeader = 'Date,Time,Timezone,Hg Conc. (mg/m3)\n';
                        const csvRows = processedHg.map(d => {
                            const date = new Date(d.time * 1000);
                            const dateStr = date.toLocaleDateString('en-US');
                            const timeStr = date.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
                            const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
                            return `${dateStr},${timeStr},${tz},${d.value}`;
                        }).join('\n');
                        
                        let fileContent = '';
                        if (fileHeader && fileHeader !== 'None') fileContent += fileHeader + '\n';
                        if (calHeader && calHeader !== 'None') {
                            const calMatch = calHeader.match(/Calibrated (\d+)/);
                            if (calMatch) {
                                const calDate = new Date(parseInt(calMatch[1]) * 1000);
                                fileContent += `Calibrated on ${calDate.toLocaleDateString('en-US')}\n`;
                            } else {
                                fileContent += calHeader + '\n';
                            }
                        }
                        fileContent += csvHeader + csvRows;
                        
                        // Save to localStorage for recovery before attempting file downloads
                        // This protects against user blocking the "multiple downloads" prompt
                        saveRecoveryData(lines, fileContent, fileHeader);
                        
                        // Auto-save without prompts for Quick Sync
                        // Save mercury data CSV
                        const hgFilename = generateFilename(fileHeader, 'csv', 'Hg');
                        downloadFallback(fileContent, hgFilename);
                        addLog(`Saved mercury data to ${hgFilename}`, 'success');
                        
                        // Also save raw log file
                        const rawLogContent = lines.join('\n');
                        const logFilename = generateFilename(fileHeader, 'txt', 'Log');
                        downloadFallback(rawLogContent, logFilename);
                        addLog(`Saved raw log to ${logFilename}`, 'success');
                        
                        // Clear recovery data after successful downloads
                        clearRecoveryData();
                        
                        downloadSuccess = true;
                    } else {
                        // No mercury data, but still save the raw log if there are lines
                        if (lines.length > 0) {
                            saveRecoveryData(lines, '', fileHeader);
                            const rawLogContent = lines.join('\n');
                            const logFilename = generateFilename(fileHeader, 'txt', 'Log');
                            downloadFallback(rawLogContent, logFilename);
                            addLog(`Saved raw log to ${logFilename}`, 'success');
                            clearRecoveryData();
                        }
                        addLog('No mercury data found in download', 'warning');
                        downloadSuccess = true; // Still consider it successful if device had no data
                    }
                    
                    setProgress(33);
                    
                } catch (error) {
                    addLog(`Download failed: ${error.message}`, 'error');
                    showToast(`Quick Sync failed during download: ${error.message}`, 'error');
                    serialRef.current.echoEnabled = true;
                    setBusy(false);
                    setStatusMessage('');
                    setProgress(0);
                    return;
                }
                
                // Step 2: Erase (only if download was successful)
                if (downloadSuccess) {
                    try {
                        setStatusMessage('Quick Sync: Erasing data...');
                        addLog('Step 2/3: Erasing data (~35 seconds)...');
                        
                        const eraseStart = Date.now();
                        const ERASE_ESTIMATE_MS = 35000;
                        
                        const eraseTimer = setInterval(() => {
                            const elapsed = Date.now() - eraseStart;
                            const pct = 33 + Math.min(33, (elapsed / ERASE_ESTIMATE_MS) * 33);
                            const remaining = Math.max(0, Math.ceil((ERASE_ESTIMATE_MS - elapsed) / 1000));
                            setProgress(pct);
                            setStatusMessage(`Quick Sync: Erasing... ~${remaining}s`);
                        }, 500);
                        
                        await serialRef.current.write('erase_all_data\n');
                        
                        if (await serialRef.current.expect('Flash chip erased', 60000)) {
                            clearInterval(eraseTimer);
                            addLog('Data erased successfully', 'success');
                            setProgress(66);
                        } else {
                            clearInterval(eraseTimer);
                            throw new Error('Erase timeout');
                        }
                    } catch (error) {
                        addLog(`Erase failed: ${error.message}`, 'error');
                        showToast(`Quick Sync: Erase failed, but data was saved`, 'warning');
                        // Continue to time sync anyway
                    }
                }
                
                // Step 3: Time sync
                try {
                    setStatusMessage('Quick Sync: Syncing time...');
                    addLog('Step 3/3: Syncing device time...');
                    setProgress(80);
                    
                    const timestamp = getCurrentUTCTimestamp();
                    await serialRef.current.write(`set_time ${timestamp}\n`);
                    
                    if (await serialRef.current.expect('Time successfully set', 5000)) {
                        const timeStr = new Date().toLocaleString();
                        addLog(`Time synced to ${timeStr}`, 'success');
                        setProgress(100);
                    } else {
                        throw new Error('Time sync timeout');
                    }
                    
                    showToast('Quick Sync completed successfully!', 'success');
                    addLog('Quick Sync completed!', 'success');
                    
                } catch (error) {
                    addLog(`Time sync failed: ${error.message}`, 'error');
                    showToast('Quick Sync: Time sync failed, but data was saved', 'warning');
                }
                
                setBusy(false);
                setStatusMessage('');
                setTimeout(() => setProgress(0), 2000);
            };

            const handleErase = async () => {
                setShowEraseModal(false);
                try {
                    if (!serialRef.current.isConnected) throw new Error('Device is not connected');
                    setBusy(true);
                    setProgress(0);
                    setStatusMessage('Preparing device...');
                    addLog('Starting data erase (~35 seconds)...', 'warning');
                    
                    // Halt the device before erase
                    await serialRef.current.forceSuspendedMode();
                    await new Promise(r => setTimeout(r, 200));
                    
                    setStatusMessage('Erasing data... ~35s remaining');
                    
                    const eraseStart = Date.now();
                    const ERASE_ESTIMATE_MS = 35000;
                    
                    // Update progress bar and countdown during erase
                    const eraseTimer = setInterval(() => {
                        const elapsed = Date.now() - eraseStart;
                        const pct = Math.min(95, (elapsed / ERASE_ESTIMATE_MS) * 100);
                        const remaining = Math.max(0, Math.ceil((ERASE_ESTIMATE_MS - elapsed) / 1000));
                        setProgress(pct);
                        setStatusMessage(`Erasing data... ~${remaining}s remaining`);
                    }, 500);
                    
                    await serialRef.current.write('erase_all_data\n');
                    
                    if (await serialRef.current.expect('Flash chip erased', 60000)) {
                        clearInterval(eraseTimer);
                        setProgress(100);
                        setStatusMessage('Erase complete');
                        addLog('Data erased successfully', 'success');
                        showToast('All device data has been erased', 'success');
                        setDataDownloaded(false);
                        setHgData([]);
                        setTwaData([]);
                        setOshaTwaData([]);
                    } else {
                        clearInterval(eraseTimer);
                        throw new Error('Erase timeout');
                    }
                } catch (error) {
                    addLog(`Erase failed: ${error.message}`, 'error');
                    showToast(`Erase failed: ${error.message}`, 'error');
                } finally {
                    setBusy(false);
                    setTimeout(() => {
                        setStatusMessage('');
                        setProgress(0);
                    }, 2000);
                }
            };

            const handleReset = async () => {
                try {
                    if (!serialRef.current.isConnected) throw new Error('Device is not connected');
                    setBusy(true);
                    setStatusMessage('Resetting device...');
                    
                    await serialRef.current.write('reset\n');
                    
                    if (await serialRef.current.expect('Reset', 10000) || 
                        await serialRef.current.expect('reset', 10000)) {
                        addLog('Device reset successfully', 'success');
                    } else {
                        addLog('Reset command sent (check device)', 'warning');
                    }
                } catch (error) {
                    addLog(`Reset failed: ${error.message}`, 'error');
                } finally {
                    setBusy(false);
                    setStatusMessage('');
                }
            };

            const handleLoadFile = async () => {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = '.txt,.csv';
                
                input.onchange = async (e) => {
                    const file = e.target.files[0];
                    if (!file) return;
                    
                    try {
                        addLog(`Loading file: ${file.name}`);
                        const text = await file.text();
                        const lines = text.split('\n');
                        
                        const { hgData: processedHg } = processFileLines(lines);
                        const { twa, oshaTwa, sessions: sessionInfo } = calculateTWA(processedHg);
                        
                        setHgData(processedHg);
                        setTwaData(twa);
                        setOshaTwaData(oshaTwa);
                        setSessions(sessionInfo);
                        
                        if (processedHg.length > 0) {
                            addLog(`Loaded ${processedHg.length} mercury readings in ${sessionInfo.length} session(s)`, 'success');
                            const finalTwa = oshaTwa[oshaTwa.length - 1]?.value || 0;
                            addLog(`Final 8hr TWA: ${finalTwa.toFixed(4)} mg/m³`);
                            
                            // Store data and show worker modal
                            setPendingDataForWorker(processedHg);
                            setShowWorkerModal(true);
                        } else {
                            addLog('No mercury data found in file', 'warning');
                        }
                    } catch (error) {
                        addLog(`Failed to load file: ${error.message}`, 'error');
                    }
                };
                
                input.click();
            };

            // Stats calculation
            const stats = {
                readings: hgData.length,
                sessionCount: sessions.length,
                maxConc: hgData.length > 0 ? Math.max(...hgData.map(d => d.value)).toFixed(4) : '--',
                finalTwa: oshaTwaData.length > 0 ? oshaTwaData[oshaTwaData.length - 1].value.toFixed(4) : '--',
                duration: hgData.length > 1 ? 
                    Math.round((hgData[hgData.length - 1].time - hgData[0].time) / 60) : 0,
            };

            return (
                <div>
                    <Header
                        connected={connected}
                        version={version}
                        onConnect={handleConnect}
                        onDisconnect={handleDisconnect}
                    />

                    {/* Toast Notifications */}
                    <ToastContainer toasts={toasts} removeToast={removeToast} />

                    {!webSerialSupported && (
                        <div style={{ 
                            background: 'rgba(239, 68, 68, 0.15)', 
                            border: '1px solid rgba(239, 68, 68, 0.3)',
                            padding: '16px 32px',
                            display: 'flex',
                            alignItems: 'center',
                            gap: '12px',
                        }}>
                            <Icons.AlertTriangle />
                            <span>
                                Web Serial API not supported. Please use Chrome or Edge browser.
                                You can still load and plot existing data files.
                            </span>
                        </div>
                    )}

                    <main style={styles.main}>
                        <div style={styles.grid}>
                            {/* Left Panel - Controls */}
                            <div style={{ display: 'flex', flexDirection: 'column', gap: '20px' }}>
                                {/* Device Actions */}
                                <div style={styles.card}>
                                    <div style={styles.cardHeader}>
                                        <span style={styles.cardTitle}>
                                            <Icons.Usb />
                                            Device Actions
                                        </span>
                                    </div>
                                    <div style={styles.cardContent}>
                                        {statusMessage && (
                                            <div style={{ 
                                                marginBottom: '16px', 
                                                padding: '12px', 
                                                background: 'var(--bg-secondary)',
                                                borderRadius: '8px',
                                            }}>
                                                <div style={{ display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '8px' }}>
                                                    {busy && <div style={styles.spinner} />}
                                                    <span style={{ fontSize: '13px', color: 'var(--accent-gold)' }}>{statusMessage}</span>
                                                </div>
                                                {progress > 0 && (
                                                    <div style={styles.progressBar}>
                                                        <div style={styles.progressFill(progress)} />
                                                    </div>
                                                )}
                                            </div>
                                        )}
                                        
                                        <div style={styles.actionGrid}>
                                            <ActionButton
                                                icon={Icons.Download}
                                                label="Download"
                                                onClick={handleDownload}
                                                disabled={!connected || busy}
                                                variant="primary"
                                            />
                                            <ActionButton
                                                icon={Icons.Bell}
                                                label="Set Alarms"
                                                onClick={openAlarmModal}
                                                disabled={!connected || busy}
                                            />
                                            <ActionButton
                                                icon={Icons.Clock}
                                                label="Sync Time"
                                                onClick={() => setShowTimesyncModal(true)}
                                                disabled={!connected || busy}
                                            />
                                            <ActionButton
                                                icon={Icons.RefreshCw}
                                                label="Reset"
                                                onClick={handleReset}
                                                disabled={!connected || busy}
                                            />
                                        </div>
                                        
                                        <div style={{ marginTop: '12px' }}>
                                            <ActionButton
                                                icon={Icons.Zap}
                                                label="Quick Sync"
                                                onClick={handleQuickSync}
                                                disabled={!connected || busy}
                                                variant="success"
                                            />
                                            <div style={{ fontSize: '11px', color: 'var(--text-muted)', marginTop: '6px', textAlign: 'center' }}>
                                                Download → Erase → Set Clock
                                            </div>
                                        </div>
                                        
                                        <div style={{ marginTop: '12px' }}>
                                            <ActionButton
                                                icon={Icons.Trash}
                                                label="Erase All Data"
                                                onClick={() => setShowEraseModal(true)}
                                                disabled={!connected || busy}
                                                variant="danger"
                                            />
                                        </div>
                                    </div>
                                </div>

                                {/* File Operations */}
                                <div style={styles.card}>
                                    <div style={styles.cardHeader}>
                                        <span style={styles.cardTitle}>
                                            <Icons.Chart />
                                            Data Files
                                        </span>
                                    </div>
                                    <div style={styles.cardContent}>
                                        <ActionButton
                                            icon={Icons.Upload}
                                            label="Load Data File"
                                            onClick={handleLoadFile}
                                            disabled={busy}
                                            variant="secondary"
                                        />
                                        {hasRecoveryData && (
                                            <div style={{ marginTop: '12px' }}>
                                                <div style={{ 
                                                    fontSize: '11px', 
                                                    color: 'var(--accent-orange)', 
                                                    marginBottom: '8px',
                                                    padding: '8px',
                                                    background: 'rgba(249, 115, 22, 0.1)',
                                                    borderRadius: '6px',
                                                    border: '1px solid rgba(249, 115, 22, 0.2)',
                                                }}>
                                                    ⚠️ Unsaved download data found in browser storage
                                                </div>
                                                <div style={{ display: 'flex', gap: '8px' }}>
                                                    <ActionButton
                                                        icon={Icons.Download}
                                                        label="Recover"
                                                        onClick={handleRecoverData}
                                                        disabled={busy}
                                                        variant="primary"
                                                    />
                                                    <ActionButton
                                                        icon={Icons.Trash}
                                                        label="Discard"
                                                        onClick={clearRecoveryData}
                                                        disabled={busy}
                                                        variant="danger"
                                                    />
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                </div>

                                {/* Stats */}
                                <div style={styles.card}>
                                    <div style={styles.cardHeader}>
                                        <span style={styles.cardTitle}>
                                            <Icons.Info />
                                            Session Statistics
                                        </span>
                                    </div>
                                    <div style={styles.cardContent}>
                                        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '12px' }}>
                                            <div style={styles.stat}>
                                                <span style={styles.statLabel}>Readings</span>
                                                <span style={{ ...styles.statValue, color: 'var(--accent-gold)' }}>
                                                    {stats.readings}
                                                </span>
                                            </div>
                                            <div style={styles.stat}>
                                                <span style={styles.statLabel}>Sessions</span>
                                                <span style={{ ...styles.statValue, color: 'var(--accent-cyan)' }}>
                                                    {stats.sessionCount || '--'}
                                                </span>
                                            </div>
                                            <div style={styles.stat}>
                                                <span style={styles.statLabel}>Max Conc.</span>
                                                <span style={{ ...styles.statValue, fontSize: '18px', color: 'var(--accent-orange)' }}>
                                                    {stats.maxConc}
                                                </span>
                                            </div>
                                            <div style={styles.stat}>
                                                <span style={styles.statLabel}>8hr TWA</span>
                                                <span style={{ ...styles.statValue, fontSize: '18px', color: 'var(--accent-green)' }}>
                                                    {stats.finalTwa}
                                                </span>
                                            </div>
                                        </div>
                                        {sessions.length > 1 && (
                                            <div style={{ 
                                                marginTop: '12px', 
                                                padding: '10px', 
                                                background: 'var(--bg-secondary)', 
                                                borderRadius: '8px',
                                                fontSize: '12px',
                                                color: 'var(--text-secondary)',
                                            }}>
                                                <div style={{ fontWeight: '600', marginBottom: '6px', color: 'var(--text-primary)' }}>
                                                    Session Details
                                                </div>
                                                {sessions.map((s, i) => (
                                                    <div key={i} style={{ 
                                                        display: 'flex', 
                                                        justifyContent: 'space-between',
                                                        padding: '4px 0',
                                                        borderBottom: i < sessions.length - 1 ? '1px solid var(--border)' : 'none',
                                                    }}>
                                                        <span>Session {i + 1}: {s.dataPoints} pts</span>
                                                        <span style={{ color: 'var(--accent-green)' }}>
                                                            TWA: {s.finalTwa.toFixed(4)}
                                                        </span>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                </div>

                                {/* Cartridge Tracker */}
                                <div style={styles.card}>
                                    <div style={styles.cardHeader}>
                                        <span style={styles.cardTitle}>
                                            <Icons.Shield />
                                            Respirator Cartridge Tracker
                                        </span>
                                    </div>
                                    <div style={styles.cardContent}>
                                        <CartridgeTracker 
                                            cartridgeData={cartridgeData}
                                            onCartridgeDataChange={handleCartridgeDataChange}
                                            addLog={addLog}
                                            showToast={showToast}
                                        />
                                        <div style={{ 
                                            marginTop: '12px', 
                                            padding: '10px', 
                                            background: 'var(--bg-secondary)', 
                                            borderRadius: '8px',
                                            fontSize: '11px',
                                            color: 'var(--text-muted)',
                                            lineHeight: '1.5',
                                        }}>
                                            OSHA minimum cartridge capacity: {OSHA_CARTRIDGE_CAPACITY} mg·hr/m³. 
                                            Cumulative dose is tracked across multiple downloads per worker per cartridge.
                                            Start a new cartridge session when cartridges are replaced.
                                        </div>
                                    </div>
                                </div>

                                {/* Activity Log */}
                                <div style={styles.card}>
                                    <div style={styles.cardHeader}>
                                        <span style={styles.cardTitle}>Activity Log</span>
                                    </div>
                                    <div style={styles.cardContent}>
                                        <LogPanel logs={logs} />
                                    </div>
                                </div>
                            </div>

                            {/* Right Panel - Chart */}
                            <div style={styles.card}>
                                <div style={styles.cardHeader}>
                                    <span style={styles.cardTitle}>
                                        <Icons.Chart />
                                        Mercury Concentration
                                    </span>
                                    {hgData.length > 0 && (
                                        <span style={{ fontSize: '13px', color: 'var(--text-muted)' }}>
                                            {new Date(hgData[0].time * 1000).toLocaleDateString()} - {new Date(hgData[hgData.length - 1].time * 1000).toLocaleDateString()}
                                        </span>
                                    )}
                                </div>
                                <DataChart 
                                    data={hgData} 
                                    twaData={twaData} 
                                    oshaTwaData={oshaTwaData} 
                                />
                            </div>
                        </div>
                    </main>

                    {/* Modals */}
                    {showAlarmModal && (
                        <AlarmModal
                            onClose={() => setShowAlarmModal(false)}
                            onSave={handleSetAlarms}
                            initialLow={currentAlarms.low}
                            initialHigh={currentAlarms.high}
                            initialTwa={currentAlarms.twa}
                            loading={alarmLoading}
                        />
                    )}

                    {showTimesyncModal && (
                        <ConfirmModal
                            title="Sync Device Time"
                            message={`Sync device time to your computer's current time?\n\n${new Date().toLocaleString()}`}
                            confirmText="Sync Time"
                            onConfirm={handleTimesync}
                            onCancel={() => setShowTimesyncModal(false)}
                        />
                    )}

                    {showEraseModal && (
                        <ConfirmModal
                            title="Erase All Data"
                            message={
                                dataDownloaded
                                    ? "Are you sure you want to erase all data from the device? This cannot be undone."
                                    : "WARNING: Data has not been downloaded in this session. Are you sure you want to erase all data? This cannot be undone."
                            }
                            confirmText="Erase Data"
                            danger={true}
                            onConfirm={handleErase}
                            onCancel={() => setShowEraseModal(false)}
                        />
                    )}

                    {showWorkerModal && (
                        <WorkerIdModal
                            workers={cartridgeData.workers || {}}
                            lastWorkerId={lastWorkerId}
                            onConfirm={(workerId) => {
                                setShowWorkerModal(false);
                                if (workerId && pendingDataForWorker) {
                                    assignDataToWorker(workerId, pendingDataForWorker);
                                }
                                setPendingDataForWorker(null);
                            }}
                            onCancel={() => {
                                setShowWorkerModal(false);
                                setPendingDataForWorker(null);
                            }}
                        />
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
